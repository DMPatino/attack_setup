
<style>

  .root {

    width: 100%;

    flex-direction: column;
    align-items: center;
    padding: 40px 20px 36px;

  }
  .top-label {

  }
  .divider {

    border: none;
    border-top: 1px solid #1a3a1a;
    margin: 0 auto 36px;
  }
  .logo-area {
    margin-bottom: 36px;
  }
  .blink { animation: blink 1.4s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .scan { animation: scan 3s ease-in-out infinite alternate; }
  @keyframes scan {
    0%   { opacity: 0.5; }
    100% { opacity: 1; }
  }
  .footer-text {
    font-size: 9px;

    color: #1a5a1a;

  .allies-line {

    text-transform: uppercase;
    margin-bottom: 32px;
